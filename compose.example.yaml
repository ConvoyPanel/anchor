services:
  anchor:
    image: ghcr.io/convoypanel/anchor:latest
    restart: unless-stopped
    volumes:
      - anchor-config:/etc/anchor
    networks:
      - anchor

  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      ANCHOR_DOMAIN: ${ANCHOR_DOMAIN:?Set ANCHOR_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./packaging/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - anchor

volumes:
  anchor-config:
  caddy-data:
  caddy-config:

networks:
  anchor:

